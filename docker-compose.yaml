services:
  app:
    build: .
    container_name: recommendation_app
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - db_data:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/db/bot.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    restart: unless-stopped

volumes:
  db_data:
